name: DevHub
options:
  bundleIdPrefix: com.devhub
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    version: 1.13.0

targets:
  DevHub:
    type: application
    platform: macOS
    sources:
      - DevHub
    dependencies:
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devhub.app
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: DevHub/DevHub.entitlements
    scheme: {}
